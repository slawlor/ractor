name: Benchmark Comparison

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: bench-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  bench-base:
    name: Benchmark main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks on main
        run: cargo bench -p ractor
        env:
          CI: 1

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Export main baseline
        run: critcmp --export new | jq '.name = "main" | .benchmarks[].baseline = "main" | .benchmarks[].fullname |= sub("^new/"; "main/")' > main.json

      - name: Upload main baseline
        uses: actions/upload-artifact@v7
        with:
          name: bench-baseline-main
          path: main.json
          retention-days: 1

  bench-pr:
    name: Benchmark PR and compare
    runs-on: ubuntu-latest
    needs: bench-base
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Download main baseline
        uses: actions/download-artifact@v8
        with:
          name: bench-baseline-main

      - name: Run benchmarks on PR branch
        run: CI=1 cargo bench -p ractor
        env:
          CI: 1

      - name: Install critcmp
        run: cargo install critcmp --locked

      - name: Compare benchmarks
        id: compare
        run: |
          # run the comparison twice: default multi-column output and a flattened
          # list view for easier per-benchmark deltas
          RESULT=$(critcmp main.json new)
          LIST=$(critcmp main.json new --list)
          echo "$RESULT"
          echo
          echo "Flat results (see per-benchmark deltas):"
          echo "$LIST"
          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
            echo "list<<EOF"
            echo "$LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Benchmark Comparison

      - name: Post or update benchmark comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Benchmark Comparison (PR vs `main`)

            <details>
            <summary>Results (collapse to hide)</summary>

            ```
            ${{ steps.compare.outputs.result }}
            ```

            _Note: a **negative** delta indicates the PR is faster (an
            improvement); a **positive** delta means the PR is slower (a
            regression). Benchmarks are grouped (e.g., `small_messages`,
            `spawn_throughput`); the flattened list below shows every
            individual comparison for clearer deltas._

            === per-benchmark breakdown ===

            ```
            ${{ steps.compare.outputs.list }}
            ```

            </details>

            _Benchmarks run on shared CI hardware (`ubuntu-latest`).
            Differences under ~5% may be noise._
